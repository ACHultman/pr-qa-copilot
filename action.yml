name: "PR QA Copilot"
description: "Comments a PR summary and generates a Playwright screenshot pack + optional visual diffs."
author: "Adam Hultman"

inputs:
  github_token:
    description: "GitHub token used to comment on PRs (defaults to github.token)."
    required: true
  base_url:
    description: "Base URL to run visual QA against (e.g. Vercel preview URL)."
    required: true
  paths:
    description: "Newline-separated paths to screenshot (e.g. /\n/pricing\n/dashboard)."
    required: false
    default: "/\n/build\n/results"
  viewport:
    description: "Viewport as WIDTHxHEIGHT (e.g. 1280x720)."
    required: false
    default: "1280x720"
  openai_api_key:
    description: "Optional. If set, generates a higher-quality PR summary using OpenAI."
    required: false
  openai_model:
    description: "OpenAI model for PR summary."
    required: false
    default: "gpt-4o-mini"
  max_diff_chars:
    description: "Max characters of diff context to send to LLM (if enabled)."
    required: false
    default: "12000"
  artifact_name:
    description: "Name for the uploaded artifact."
    required: false
    default: "pr-qa-copilot"
  license_key:
    description: "Optional. Pro license key (enables gated features like visual diffs)."
    required: false
  license_server_url:
    description: "Optional. License server base URL (default: https://prqacopilot.com)."
    required: false
    default: "https://prqacopilot.com"

outputs:
  artifact_name:
    description: "Uploaded artifact name"
    value: ${{ inputs.artifact_name }}
  artifact_id:
    description: "Uploaded artifact id"
    value: ${{ steps.upload.outputs.artifact-id }}
  artifact_url:
    description: "Uploaded artifact URL"
    value: ${{ steps.upload.outputs.artifact-url }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install action deps
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        npm ci --omit=dev

    - name: Install Playwright (Chromium)
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        # Avoid relying on npm bin-linking in production installs.
        node "./node_modules/playwright/cli.js" install --with-deps chromium

    - name: Run PR QA Copilot
      shell: bash
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_BASE_URL: ${{ inputs.base_url }}
        INPUT_PATHS: ${{ inputs.paths }}
        INPUT_VIEWPORT: ${{ inputs.viewport }}
        INPUT_OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        INPUT_OPENAI_MODEL: ${{ inputs.openai_model }}
        INPUT_MAX_DIFF_CHARS: ${{ inputs.max_diff_chars }}
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact_name }}
        INPUT_LICENSE_KEY: ${{ inputs.license_key }}
        INPUT_LICENSE_SERVER_URL: ${{ inputs.license_server_url }}
      run: |
        node "${{ github.action_path }}/scripts/run.js"

    - name: Upload PR QA Copilot artifact
      id: upload
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact_name }}
        path: pr-qa-artifacts
        if-no-files-found: error
        retention-days: 7
