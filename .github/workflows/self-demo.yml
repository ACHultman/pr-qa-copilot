name: PR QA Copilot (self-demo)

on:
  pull_request:
    types: [opened, synchronize, reopened]

  # Allows running the demo without opening a PR (useful for pilots).
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test (e.g. Vercel preview URL)"
        required: true
        default: "https://example.com"
      paths:
        description: "Newline-separated paths"
        required: false
        default: "/"

permissions:
  contents: read
  pull-requests: write
  actions: write # required for artifact upload

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Demo target: example.com (always up). Replace with your Vercel/Netlify preview URL.
      - uses: ./. 
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          base_url: ${{ github.event.inputs.base_url || 'https://example.com' }}
          paths: |
            ${{ github.event.inputs.paths || '/' }}
